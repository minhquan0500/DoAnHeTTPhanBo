global:
  scrape_interval: 5s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - "/etc/prometheus/alert_rules.yml"

scrape_configs:
  - job_name: 'backend_servers'
    static_configs:
      - targets: ['backend1:8000', 'backend2:8000', 'backend3:8000']